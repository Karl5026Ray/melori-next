<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Melori Music</title>
  <style>
    html, body {
      margin: 0; height: 100%;
      background: #111111; color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center;
      text-align: center;
    }
    .wrap { padding: 24px; }
    h1 { font-weight: 700; letter-spacing: .5px; margin: 16px 0 8px; }
    h1 span { color: #ff8c00; }
    p { color: #b0b0b0; max-width: 320px; line-height: 1.5; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: #ff8c00;
      display: inline-block; margin-top: 20px; animation: pulse 1.2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:.3;transform:scale(.8)} 50%{opacity:1;transform:scale(1)} }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>MELORI <span>MUSIC</span></h1>
    <p>Connecting you to independent music. If this screen stays, check your internet connection.</p>
    <div class="dot"></div>
  </div>
</body>
</html>
